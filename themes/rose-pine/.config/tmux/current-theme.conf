# rose-pine tmux colors
set -g pane-border-style fg=#6e6a86
set -g pane-active-border-style fg=#c4a7e7
set -g status-bg '#191724'
set -g status-fg '#e0def4'
set -g status-left '#[fg=#ebbcba]#S #[fg=#f6c177]|'
set -g status-right '#[fg=#ebbcba]%Y-%m-%d #[fg=#e0def4]%H:%M #[fg=#f6c177][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#e0def4,bold]#I:#W#[default]'
