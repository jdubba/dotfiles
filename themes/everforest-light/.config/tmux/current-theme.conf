# everforest-light tmux colors
set -g pane-border-style fg=#e6e2cc
set -g pane-active-border-style fg=#df69ba
set -g status-bg '#fdf6e3'
set -g status-fg '#5c6a72'
set -g status-left '#[fg=#35a77c]#S #[fg=#dfa000]|'
set -g status-right '#[fg=#35a77c]%Y-%m-%d #[fg=#5c6a72]%H:%M #[fg=#dfa000][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#5c6a72,bold]#I:#W#[default]'
