# monokai-pro tmux colors
set -g pane-border-style fg=#727072
set -g pane-active-border-style fg=#ab9df2
set -g status-bg '#2d2a2e'
set -g status-fg '#fcfcfa'
set -g status-left '#[fg=#78dce8]#S #[fg=#ffd866]|'
set -g status-right '#[fg=#78dce8]%Y-%m-%d #[fg=#fcfcfa]%H:%M #[fg=#ffd866][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#fcfcfa,bold]#I:#W#[default]'
