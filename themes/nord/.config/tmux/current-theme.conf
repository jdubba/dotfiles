# nord tmux colors
set -g pane-border-style fg=#4c566a
set -g pane-active-border-style fg=#b48ead
set -g status-bg '#2e3440'
set -g status-fg '#d8dee9'
set -g status-left '#[fg=#88c0d0]#S #[fg=#ebcb8b]|'
set -g status-right '#[fg=#88c0d0]%Y-%m-%d #[fg=#d8dee9]%H:%M #[fg=#ebcb8b][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#e5e9f0,bold]#I:#W#[default]'
