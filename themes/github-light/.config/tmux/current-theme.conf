# github-light tmux colors
set -g pane-border-style fg=#57606a
set -g pane-active-border-style fg=#8250df
set -g status-bg '#ffffff'
set -g status-fg '#24292f'
set -g status-left '#[fg=#1b7c83]#S #[fg=#4d2d00]|'
set -g status-right '#[fg=#1b7c83]%Y-%m-%d #[fg=#24292f]%H:%M #[fg=#4d2d00][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#6e7781,bold]#I:#W#[default]'
