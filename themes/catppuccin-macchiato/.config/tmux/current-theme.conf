# catppuccin-macchiato tmux colors
set -g pane-border-style fg=#5b6078
set -g pane-active-border-style fg=#f5bde6
set -g status-bg '#24273a'
set -g status-fg '#cad3f5'
set -g status-left '#[fg=#8bd5ca]#S #[fg=#eed49f]|'
set -g status-right '#[fg=#8bd5ca]%Y-%m-%d #[fg=#cad3f5]%H:%M #[fg=#eed49f][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#b8c0e0,bold]#I:#W#[default]'
