# catppuccin-frappe tmux colors
set -g pane-border-style fg=#626880
set -g pane-active-border-style fg=#f4b8e4
set -g status-bg '#303446'
set -g status-fg '#c6d0f5'
set -g status-left '#[fg=#81c8be]#S #[fg=#e5c890]|'
set -g status-right '#[fg=#81c8be]%Y-%m-%d #[fg=#c6d0f5]%H:%M #[fg=#e5c890][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#b5bfe2,bold]#I:#W#[default]'
