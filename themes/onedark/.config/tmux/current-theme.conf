# onedark tmux colors
set -g pane-border-style fg=#545862
set -g pane-active-border-style fg=#c678dd
set -g status-bg '#282c34'
set -g status-fg '#abb2bf'
set -g status-left '#[fg=#56b6c2]#S #[fg=#e5c07b]|'
set -g status-right '#[fg=#56b6c2]%Y-%m-%d #[fg=#abb2bf]%H:%M #[fg=#e5c07b][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#abb2bf,bold]#I:#W#[default]'
