# ayu-mirage tmux colors
set -g pane-border-style fg=#686868
set -g pane-active-border-style fg=#cfbafa
set -g status-bg '#1f2430'
set -g status-fg '#cbccc6'
set -g status-left '#[fg=#90e1c6]#S #[fg=#fad07b]|'
set -g status-right '#[fg=#90e1c6]%Y-%m-%d #[fg=#cbccc6]%H:%M #[fg=#fad07b][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#c7c7c7,bold]#I:#W#[default]'
