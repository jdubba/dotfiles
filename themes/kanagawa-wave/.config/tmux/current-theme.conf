# kanagawa-wave tmux colors
set -g pane-border-style fg=#727169
set -g pane-active-border-style fg=#957fb8
set -g status-bg '#1f1f28'
set -g status-fg '#dcd7ba'
set -g status-left '#[fg=#6a9589]#S #[fg=#c0a36e]|'
set -g status-right '#[fg=#6a9589]%Y-%m-%d #[fg=#dcd7ba]%H:%M #[fg=#c0a36e][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#c8c093,bold]#I:#W#[default]'
