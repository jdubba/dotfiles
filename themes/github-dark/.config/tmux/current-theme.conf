# github-dark tmux colors
set -g pane-border-style fg=#6e7681
set -g pane-active-border-style fg=#bc8cff
set -g status-bg '#0d1117'
set -g status-fg '#c9d1d9'
set -g status-left '#[fg=#39c5cf]#S #[fg=#d29922]|'
set -g status-right '#[fg=#39c5cf]%Y-%m-%d #[fg=#c9d1d9]%H:%M #[fg=#d29922][#(whoami)]'
setw -g window-status-format '#I:#W'
setw -g window-status-current-format '#[fg=#b1bac4,bold]#I:#W#[default]'
