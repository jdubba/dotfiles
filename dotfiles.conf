# dotfiles.conf - repository-level configuration (committed, shared).
#
# This file is an optional shell fragment sourced by the dotfiles tool. The
# tool ships with sensible defaults; use this file only to extend them.
#
# The most important setting is the container-directory set: directories that
# are shared by many applications and must NEVER be folded into a single
# symlink. The tool always keeps these as real directories and links only the
# specific children the repo manages. Append your own as needed:
#
#   DF_CONTAINER_DIRS+=(".config/fontconfig" ".vim")
#
# Add basenames that should never be treated as managed content:
#
#   DF_IGNORE_NAMES+=("lazy-lock.json")

# (defaults are defined in lib/config.sh)

# elephant loads compiled provider plugins (.so) from ~/.config/elephant/providers/.
# Keep that directory real so the binaries can never be folded or adopted; only
# the tracked providers.list manifest beside it is linked.
DF_CONTAINER_DIRS+=(".config/elephant")
