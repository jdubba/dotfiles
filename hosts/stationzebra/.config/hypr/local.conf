# stationzebra Hyprland host include (sourced from the shared hyprland.conf).
#
# Hyprland-only laptop + dual-external dock, launched from a TTY login shell, so
# the session already has the additive PATH (env.sh/path.d) and the session env
# is already in the systemd --user manager. Nothing host-specific to autostart.

# LG TV SSCR2 dock monitors — correct mode + scale on first enumeration.
# Both TVs share an identical EDID (LG ships 0x01010101 as a placeholder serial)
# so they cannot be distinguished by description; the same rule applies to both.
# Position is left as `auto` because the correct absolute positions depend on
# which connector is left vs right, which dock-layout.sh resolves at runtime.
# The key win: Hyprland sees 3840x2160@30 immediately on connect, so dock-layout.sh
# only has to fix positions (cheap) instead of also changing modes (causes full
# compositor reflow and window scatter).
monitor = desc:LG Electronics LG TV SSCR2 0x01010101, 3840x2160@30, auto, 1

# Laptop panel — explicit scale 1 prevents Hyprland from auto-detecting HiDPI
# (226 DPI triggers scale 2) every time the LG TV positions are shuffled by
# dock-layout.sh.  Position is auto; dock-layout.sh sets the final absolute pos.
monitor = eDP-1, 2560x1600@180, auto, 1

# Workspace->monitor binding for the laptop panel (stable connector name).
# Workspaces 1-6 are assigned to the two LG TV dock outputs at runtime by
# dock-layout.sh / move-workspaces.sh (those connectors have dynamic DP-N names
# and identical EDIDs, so they cannot be targeted here by description).
# When the dock is absent Hyprland automatically relocates all workspaces to
# eDP-1; when it reconnects dock-monitor.sh re-applies the LG TV assignments.
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
