# Fedora host Hyprland glue (sourced from the shared ~/.config/hypr/hyprland.conf,
# BEFORE it starts hyprland-session.target).
#
# Fedora runs GNOME *and* Hyprland from GDM, and GDM starts the plain Hyprland
# session without a login shell. This file carries the bits that are specific to
# that setup so the shared config stays machine-agnostic.

# Import the Wayland session env (WAYLAND_DISPLAY, XDG_CURRENT_DESKTOP=Hyprland,
# HYPRLAND_INSTANCE_SIGNATURE, ...) into the D-Bus + systemd --user manager so the
# dual-session guards (kanshi/waybar *.service.d drop-ins in this host layer) can
# gate on XDG_CURRENT_DESKTOP=Hyprland. Runs before hyprland-session.target.
exec-once = dbus-update-activation-environment --systemd --all

# Autostarts stationzebra gets by other means but Fedora needs explicitly:
exec-once = hyprpaper
exec-once = systemctl --user start hyprpolkitagent.service

# REMAINING WORK (see fedora-handoff.md): under GDM the *compositor's* PATH is
# minimal (/usr/local/bin:/usr/bin), so the shared `exec-once = elephant/walker`
# and the `walker` keybinds can't find ~/.local/bin. Fix this at the SESSION
# LEVEL (launch Hyprland via uwsm, or a login shell) so env.sh's additive PATH
# (path.d) reaches the compositor. Do NOT reintroduce an `env = PATH,...`
# rewrite - it clobbers other machines' PATHs.
