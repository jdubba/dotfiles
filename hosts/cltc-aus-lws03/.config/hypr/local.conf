# cltc-aus-lws03 (Fedora) Hyprland glue (sourced from the shared
# ~/.config/hypr/hyprland.conf, BEFORE it starts hyprland-session.target).
#
# This is a Fedora laptop running GNOME *and* Hyprland from GDM; GDM starts the
# plain Hyprland session without a login shell. This file carries the bits that
# are specific to that setup so the shared config stays machine-agnostic.

# Import the Wayland session env (WAYLAND_DISPLAY, XDG_CURRENT_DESKTOP=Hyprland,
# HYPRLAND_INSTANCE_SIGNATURE, ...) into the D-Bus + systemd --user manager so the
# dual-session guards (kanshi/waybar *.service.d drop-ins in this host layer) can
# gate on XDG_CURRENT_DESKTOP=Hyprland. Runs before hyprland-session.target.
exec-once = dbus-update-activation-environment --systemd --all

# Autostarts stationzebra gets by other means but Fedora needs explicitly:
exec-once = hyprpaper
exec-once = systemctl --user start hyprpolkitagent.service

# NOTE: under the plain GDM session the compositor's PATH is minimal
# (/usr/local/bin:/usr/bin). On this machine walker/elephant are the Fedora
# packages in /usr/bin, so the shared `exec-once = elephant/walker` and the
# `walker` keybinds resolve fine. Do NOT add an `env = PATH,...` rewrite to
# shared config (it clobbers other machines' PATHs); if you ever need
# ~/.local/bin tools launched by the compositor, use the UWSM session instead.

# Rigid workspace->monitor binding (this host's dock: two Dell P2422H + eDP-1).
# Hyprland creates each workspace directly on its assigned monitor, every time a
# hotkey opens it, regardless of creation order -- so placement is consistent
# over time (unlike kanshi's runtime moveworkspacetomonitor, which only acts on
# already-existing workspaces). Externals are bound by EDID description because
# the DP-N connector numbers are not stable across docking; the internal panel
# is bound by its stable connector name (eDP-1). persistent:true keeps all nine
# present from startup.
#   DP-6 = Dell ...CG4WYF3 (left)   -> 1, 4, 7
#   DP-5 = Dell ...JQ5X7M3 (middle) -> 2, 5, 8
#   eDP-1 = internal panel (right)  -> 3, 6, 9
# When the externals are absent (laptop-only), Hyprland auto-relocates their
# workspaces to eDP-1 and restores them on reconnect.
workspace = 1, monitor:desc:Dell Inc. DELL P2422H CG4WYF3, persistent:true
workspace = 2, monitor:desc:Dell Inc. DELL P2422H CG4WYF3, persistent:true
workspace = 3, monitor:desc:Dell Inc. DELL P2422H CG4WYF3, persistent:true
workspace = 4, monitor:desc:Dell Inc. DELL P2422H JQ5X7M3, persistent:true
workspace = 5, monitor:desc:Dell Inc. DELL P2422H JQ5X7M3, persistent:true
workspace = 6, monitor:desc:Dell Inc. DELL P2422H JQ5X7M3, persistent:true
workspace = 7, monitor:eDP-1, persistent:true
workspace = 8, monitor:eDP-1, persistent:true
workspace = 9, monitor:eDP-1, persistent:true
