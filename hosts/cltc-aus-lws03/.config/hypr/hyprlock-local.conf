# cltc-aus-lws03 hyprlock auth include (sourced from the shared ~/.config/hypr/
# hyprlock.conf via `source = hyprlock-local.conf`).
#
# Per-host hyprlock authentication seam. SEPARATE from hypr/local.conf (which is
# hyprland-only). Symlinked into ~/.config/hypr/ by the dotfiles tool so the
# shared `source = hyprlock-local.conf` resolves.
#
# This host has a Goodix MOC (match-on-chip) fingerprint sensor with an enrolled
# print, so it enables hyprlock's NATIVE fingerprint backend, which talks to
# fprintd directly over D-Bus (net.reactivated.Fprint) and runs concurrently with
# password entry (swipe or type at any time). This is separate from PAM's
# pam_fprintd.so.
#
# PAIRED WITH a password-ONLY /etc/pam.d/hyprlock (system-level; it `include`s
# password-auth, NOT login/system-auth, so pam_fprintd.so is out of the stack).
# That pairing is REQUIRED: if PAM also ran pam_fprintd, hyprlock's native backend
# and PAM would both claim the one Goodix device and unlock would wedge (lockout).
# It also removes the ~30s serial pam_fprintd unlock delay.
auth {
    pam:enabled = true
    fingerprint:enabled = true
    fingerprint:ready_message = (Scan fingerprint to unlock)
    fingerprint:present_message = Scanning fingerprint
    fingerprint:retry_delay = 250
}
