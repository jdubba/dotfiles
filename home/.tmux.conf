# ~/.tmux.conf

# Make prefix Ctrl-a instead of Ctrl-b
unbind C-b
set-option -g prefix C-u
bind-key C-u send-prefix

# Enable mouse support (scroll, select panes, resize panes)
set -g mouse on

# Set easier split commands
bind | split-window -h
unbind -
bind - split-window -v
unbind '"'
unbind %

# Set vim motion keys for pane navigation
bind-key h select-pane -L
bind-key l select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D

# Move windows left and right
bind-key C-h swap-window -t -1
bind-key C-l swap-window -t 1

# Set vi-style key bindings in copy mode
setw -g mode-keys vi

# Enable 256 color support
set -g default-terminal "screen-256color"

# Reload config file with 'prefix + r'
bind-key r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Theme colors (provided by active dotfiles theme layer)
source-file ~/.config/tmux/current-theme.conf

# Set pane border and active pane color (used if no theme overrides)
set -g pane-border-style fg=white
set -g pane-active-border-style fg=magenta

# Status bar customizations
set-option -g status-position top
set -g status-left-length 40
set -g status-right-length 90

# Start window indexing at 1 for easy direct number navigation
set -g base-index 1
setw -g pane-base-index 1
