source = current-theme.conf

# Per-host hyprlock auth include: whether the native fingerprint backend is
# enabled (and its message/retry tuning) is per-machine hardware, so it lives in
# the host layer at hosts/<hostname>/.config/hypr/hyprlock-local.conf. Every host
# ships one (a comment-only stub where there's nothing to enable). This is a
# SEPARATE file from hypr/local.conf, which is hyprland-only (exec-once/session
# glue, invalid inside hyprlock). Relative to this file's directory
# (~/.config/hypr/), like current-theme.conf.
source = hyprlock-local.conf

$accent = $mauve
$accentAlpha = $mauveAlpha
$font = JetBrainsMono Nerd Font

# GENERAL
general {
  hide_cursor = true
}

# BACKGROUND
background {
  monitor =
  path = $HOME/.config/background
  blur_passes = 3
  blur_size = 7
  color = $base
}

# LAYOUT
label {
  monitor =
  text = Layout: $LAYOUT
  color = $text
  font_size = 25
  font_family = $font
  position = 30, -30
  halign = left
  valign = top
}

# TIME
label {
  monitor =
  text = $TIME
  color = $text
  font_size = 90
  font_family = $font
  position = -30, 0
  halign = right
  valign = top
}

# DATE
label {
  monitor =
  text = cmd[update:43200000] date +"%A, %d %B %Y"
  color = $text
  font_size = 25
  font_family = $font
  position = -30, -150
  halign = right
  valign = top
}

# FINGERPRINT
# (No fingerprint-prompt label widget here.) The old config carried a malformed
# block: a bare `{ ... }` referencing an undefined `$FPRINTPROMPT` variable.
# Because it was bare (no `label` keyword) hyprlock parsed it as unknown
# top-level keys and silently ignored it, so it never actually rendered. Do NOT
# turn it into a real `label {}`: bound to the undefined `$FPRINTPROMPT` it makes
# hyprlock crash at render (~1-2s after lock -> Hyprland "lockscreen app died").
# hyprlock surfaces fingerprint status via the `auth {}` block's
# fingerprint:ready_message / present_message, not via a custom label.

# USER AVATAR
image {
  monitor =
  path = $HOME/.face
  size = 100
  border_color = $accent
  position = 0, 75
  halign = center
  valign = center
}

# INPUT FIELD
input-field {
  monitor =
  size = 300, 60
  outline_thickness = 4
  dots_size = 0.2
  dots_spacing = 0.2
  dots_center = true
  outer_color = $accent
  inner_color = $surface0
  font_color = $text
  fade_on_empty = false
  placeholder_text = <span foreground="##$textAlpha"><i>󰌾 Logged in as </i><span foreground="##$accentAlpha">$USER</span></span>
  hide_input = false
  check_color = $accent
  fail_color = $red
  fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
  capslock_color = $yellow
  position = 0, -47
  halign = center
  valign = center
}
