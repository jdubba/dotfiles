# Wallpaper is coordinated with the active dotfiles theme: the linker points
# ~/.config/background at the active theme's wallpaper (themes/<name>/.config/
# background), and hyprlock reads the same path. `dotfiles theme set` reloads
# hyprpaper via IPC. Use $HOME (hyprlang expands it in values) — never a
# machine-specific absolute path in this shared config.
wallpaper {
    monitor = *
    path = $HOME/.config/background
    fit_mode = fill
}

splash = false
