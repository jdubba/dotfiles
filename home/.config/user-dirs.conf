# Managed by dotfiles -- pairs with home/.config/user-dirs.dirs.
#
# enabled=False disables xdg-user-dirs-update, which runs at login via
# /etc/xdg/autostart/xdg-user-dirs.desktop. Left enabled, it rewrites
# ~/.config/user-dirs.dirs on every login using an atomic temp-file + rename,
# which replaces our dotfiles symlink with a real file (and mangles entries,
# e.g. XDG_VIDEOS_DIR -> "$HOME/"). Disabling it lets us own user-dirs.dirs
# ourselves via the symlink. Verified: this blocks the rewrite even under
# `xdg-user-dirs-update --force`.
enabled=False
