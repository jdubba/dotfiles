name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Extract release notes
      id: extract_notes
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        {
          echo "notes<<RELEASE_NOTES_EOF"
          if [ -f CHANGELOG.md ]; then
            awk -v version="$VERSION" '/^## \[/ { if (p) exit; if ($0 ~ version) { p=1; next } } p' CHANGELOG.md
          fi
          echo "RELEASE_NOTES_EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
        body: |
          ${{ steps.extract_notes.outputs.notes }}

          ## Installation

          ```bash
          git clone https://github.com/${{ github.repository }}.git
          cd $(basename ${{ github.repository }})
          make install        # put `dotfiles` on your PATH + install the git hook
          dotfiles status      # preview what will be linked (read-only)
          dotfiles link        # apply
          ```
