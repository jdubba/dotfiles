name: Test Dotfiles

on:
  push:
    branches: [ main, master, 'feature/*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: ./lint.sh

  test-ubuntu:
    name: Test on Ubuntu
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats
      - name: Run test suite
        run: ./test.sh
      - name: End-to-end link into a throwaway HOME
        run: |
          set -euo pipefail
          export HOME=/tmp/dfhome
          mkdir -p "$HOME"
          ./bin/dotfiles link
          # Safety property on real shipped config: ~/.config must be a REAL dir.
          test -d "$HOME/.config" && ! test -L "$HOME/.config"
          test -L "$HOME/.bashrc"
          ./bin/dotfiles status
          ./bin/dotfiles doctor

  test-fedora:
    name: Test on Fedora (container)
    needs: lint
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: dnf -y install git make bats findutils
      - uses: actions/checkout@v4
      - name: Run test suite
        run: ./test.sh
      - name: End-to-end link + distro detection
        run: |
          set -euo pipefail
          export HOME=/tmp/dfhome
          mkdir -p "$HOME"
          ./bin/dotfiles info | grep -qi fedora
          ./bin/dotfiles link
          test -d "$HOME/.config" && ! test -L "$HOME/.config"
          ./bin/dotfiles doctor
